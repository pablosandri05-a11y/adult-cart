  <circle cx="1080" cy="520" r="60" stroke="#E8845C" stroke-width="1.5" stroke-opacity="0.3" fill="none"/>
  <circle cx="1080" cy="520" r="40" stroke="#E8845C" stroke-width="1" stroke-opacity="0.2" fill="none"/>
  <circle cx="1080" cy="520" r="8" fill="#E8845C" fill-opacity="0.4"/>
  <line x1="1020" y1="520" x2="1040" y2="520" stroke="#E8845C" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="1120" y1="520" x2="1140" y2="520" stroke="#E8845C" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="1100" y="100" width="60" height="80" rx="8" stroke="#00D4AA" stroke-width="1.5" stroke-opacity="0.4" fill="none"/>
  <line x1="1112" y1="120" x2="1148" y2="120" stroke="#00D4AA" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="1112" y1="135" x2="1148" y2="135" stroke="#00D4AA" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="1112" y1="150" x2="1138" y2="150" stroke="#00D4AA" stroke-width="1" stroke-opacity="0.3"/>
