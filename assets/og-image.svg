<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0F1729"/>
  <!-- grid -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(244,235,221,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- accent glow -->
  <ellipse cx="900" cy="200" rx="400" ry="300" fill="rgba(0,212,170,0.05)"/>
  <ellipse cx="300" cy="450" rx="300" ry="220" fill="rgba(232,132,92,0.05)"/>
  <!-- eyebrow -->
  <text x="80" y="130" font-family="monospace" font-size="18" font-weight="700" letter-spacing="4" fill="#E8845C" text-transform="uppercase">PINA AI LITERACY · ADULT EDITION</text>
  <!-- main title -->
  <text x="80" y="240" font-family="Georgia, serif" font-size="72" font-weight="500" fill="#F4EBDD" letter-spacing="-2">Sette conversazioni</text>
  <text x="80" y="320" font-family="Georgia, serif" font-size="72" font-weight="500" fill="#F4EBDD" letter-spacing="-2">difficili che vale la</text>
  <text x="80" y="400" font-family="Georgia, serif" font-size="72" font-weight="500" fill="#00D4AA" letter-spacing="-2">pena avere</text>
